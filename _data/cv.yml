  summary: Geoscientist interested in surface water/groundwater interactions

  sections:
    Education:
      - institution: University of Texas at Austin, Bureau of Economic Geology
        location: Austin, Texas
        area: Geosciences
        studyType: Bachelor of Science
        start_date: 2022
        end_date: 2026
        highlights:
          - My undergraduate thesis focused on using tree rings in contrasting hydrogeologic settings to evaluate groundwater flow paths and optimize paleo-drought reconstructions. I found that perennially spring-fed trees underestimated droughts, and ephemerally spring-fed trees underestimated wet periods.
          
    Experience:
      - company: UT Austin, Bureau of Economic Geology
        position:Postbaccalaureate Researcher (RSA1)
        location: Austin, Texas
        start_date: 2026
        end_date: 
        highlights:
          - Assisted with instruction of Field Hydrogeology Course
      - company: UT Austin, Bureau of Economic Geology
        position: Undergraduate Research Assistant
        location: Austin, Texas
        start_date: 2026
        end_date: 2026
        highlights:
          - Hydrologic monitoring. Tested and deployed sensors and HOBO data loggers for hydrologic monitoring across central Texas.
          - Radon in water. Standardized methods and evaluated applications of radon as a geochemical tracer of SW/GW interaction.
          - Hydrogeologic mapping and subsurface characterization. Leveraged geologic mapping and downhole logging to characterize hydrogeologic systems.
          
      - company: UT, Austin, Jackson School of Geosciences
        position: Undergraduate Research Assistant
        location: Austin, Texas
        start_date: 2023
        end_date: 2026
        highlights:
          - Paleoclimate Cave Monitoring. Monthly monitoring of 4 caves in the Texas Hill Country. Collected dripwater, plate calcite, and atmospheric parameters. Analysis of major ions, and trace elements.
          - Urban Hydrosciences water quality monitoring. Sampling of stream water in 3 watersheds around Austin. Analysis of major ions, and trace elements
          - Project CRESSLE. Sampling of stream water to investigate environmental justice issues in Austin.

