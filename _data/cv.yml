        highlights:
          - My undergraduate thesis focused on using tree rings in contrasting hydrogeologic settings to evaluate groundwater flow paths and optimize paleo-drought reconstructions. I found that perennially spring-fed trees underestimated droughts, and ephemerally spring-fed trees underestimated wet periods.
          
