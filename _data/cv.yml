        highlights:
          - Hydrologic monitoring. Tested and deployed sensors and HOBO data loggers for hydrologic monitoring across central Texas.
          - Radon in water. Standardized methods and evaluated applications of radon as a geochemical tracer of SW/GW interaction.
          - Hydrogeologic mapping and subsurface characterization. Leveraged geologic mapping and downhole logging to characterize hydrogeologic systems.
          
